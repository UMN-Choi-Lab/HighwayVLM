services:
  highwayvlm:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: highwayvlm
    restart: unless-stopped
    ports:
      - "3000:8000"
    env_file:
      - ../../.env.server
    environment:
      # Keep DB under mounted /app/data by default.
      SQLITE_DB_PATH: /app/data/highwayvlm.db
    volumes:
      # VESSL Storage "data2" host path is typically /data2.
      # If your volume name is data-storage, set DATA2_VOLUME_PATH=/data2/data-storage.
      - ${DATA2_VOLUME_PATH:-/data2/data-storage}/highwayvlm/data:/app/data
      - ${DATA2_VOLUME_PATH:-/data2/data-storage}/highwayvlm/logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
